<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
    <body>
        
        <h1>Formulário</h1>

        <form action=""></form>

            <label for="email">E-mail</label>
            <input id="email" placeholder="mail@gmail.com" type="email">
            

            <label for="senha">Senha</label>
            <input id="senha" placeholder="senha" type="password">

            <label for="num">Campo Numerico</label>
            <input type="number" name="numero" id="num" min="0" max="10">

            <label>
                <input type="checkbox" name="" id="">
            </label>

    </body>
</html>
